<main class="bg-gray-100">
    <section class="flex flex-col w-full py-8 px-[6%] space-y-5 overflow-y-hidden">
        <h1>Admin Dashboard</h1>

        <div class="w-full bg-white rounded-md shadow-sm">
            <!-- Mat Tab Group for admin sections -->
            <mat-tab-group animationDuration="300ms" class="admin-tabs">
                <mat-tab label="Users">
                    <div class="p-6">
                        <app-edit-user></app-edit-user>
                    </div>
                </mat-tab>

                <mat-tab label="Lessons">
                    <div class="p-6">
                        <app-edit-lesson></app-edit-lesson>
                    </div>
                </mat-tab>

                <!-- <mat-tab label="Classes">
                    <div class="p-6">
                        <app-edit-class></app-edit-class>
                    </div>
                </mat-tab> -->
                <mat-tab label="Translations">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-4">
                                <label for="lang-select">Right Side Language:</label>
                                <mat-form-field appearance="fill" style="min-width: 180px">
                                    <mat-label>Language</mat-label>
                                    <mat-select [(ngModel)]="rightLanguage" (selectionChange)="onLanguageChange($event.value)">
                                        <mat-option *ngFor="let lang of availableLanguages" [value]="lang">{{ lang }}</mat-option>
                                    </mat-select>
                                </mat-form-field>
                            </div>
                            <div class="flex items-center gap-2">
                                <button mat-raised-button color="primary" (click)="openLanguageManagementDialog()"><mat-icon>language</mat-icon> Manage Languages</button>
                                <button mat-raised-button color="accent" (click)="openAddTranslationDialog()"><mat-icon>add</mat-icon> Add Translation</button>
                            </div>
                        </div>

                        <!-- Loading spinner -->
                        <div *ngIf="isLoading" class="flex justify-center py-8">
                            <mat-spinner diameter="40"></mat-spinner>
                        </div>

                        <!-- Translations table -->
                        <div class="overflow-x-auto" *ngIf="!isLoading">
                            <table mat-table [dataSource]="translationKeys" class="min-w-full bg-white rounded shadow">
                                <ng-container matColumnDef="key">
                                    <th mat-header-cell *matHeaderCellDef>Key</th>
                                    <td mat-cell *matCellDef="let key">{{ key }}</td>
                                </ng-container>
                                <ng-container matColumnDef="english">
                                    <th mat-header-cell *matHeaderCellDef>English</th>
                                    <td mat-cell *matCellDef="let key">{{ translations[key]['English'] }}</td>
                                </ng-container>
                                <ng-container matColumnDef="rightLang">
                                    <th mat-header-cell *matHeaderCellDef>{{ rightLanguage }}</th>
                                    <td mat-cell *matCellDef="let key">
                                        <input matInput [value]="translations[key][rightLanguage] || ''" (input)="onTranslationEdit(key, $event)" />
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="actions">
                                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                                    <td mat-cell *matCellDef="let key">
                                        <button mat-icon-button color="warn" (click)="deleteTranslation(key)" matTooltip="Delete translation">
                                            <mat-icon>delete</mat-icon>
                                        </button>
                                    </td>
                                </ng-container>
                                <tr mat-header-row *matHeaderRowDef="['key', 'english', 'rightLang', 'actions']"></tr>
                                <tr mat-row *matRowDef="let row; columns: ['key', 'english', 'rightLang', 'actions']"></tr>
                            </table>
                        </div>

                        <!-- Save button and message -->
                        <div class="mt-4 flex items-center gap-3">
                            <button mat-raised-button color="primary" (click)="saveTranslations()" [disabled]="isSaving || isLoading">
                                <span *ngIf="!isSaving">Save to Firebase</span>
                                <span *ngIf="isSaving">Saving...</span>
                            </button>
                            <button mat-raised-button (click)="loadTranslationsFromFirebase()" [disabled]="isLoading"><mat-icon>refresh</mat-icon> Refresh</button>
                            <span *ngIf="saveMessage" class="text-green-600">{{ saveMessage }}</span>
                        </div>
                    </div>
                </mat-tab>
            </mat-tab-group>
        </div>
    </section>
</main>
