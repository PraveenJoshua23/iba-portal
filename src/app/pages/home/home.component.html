<main class="bg-gray-100 flex">
    <section class="flex flex-col w-full py-8 px-[10%] space-y-5">
        <div class="px-5 border-b ">
            <h1>Lessons</h1>
        </div>
        <div class="flex flex-col space-y-2 px-3 py-5 w-full">

            <div class="flex items-center text-2xl text-white font-medium px-8 py-3 w-full rounded-md bg-golden-600">BB Lessons</div>
        
            <ng-container *ngFor="let lesson of lessons; let last = last">
                <div class="flex justify-between px-4 py-3 rounded-sm cursor-pointer" [ngClass]="{ 'border-b' : !last}" [routerLink]="['/lesson/bb',1]">
                    <span class=" ">{{lesson.title}}</span>
                    <span class="uppercase font-medium text-gray-400">{{lesson.status}}</span>
                </div>
            </ng-container>

        </div>
    </section>
</main>
