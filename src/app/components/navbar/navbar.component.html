<div class="flex justify-between lg:justify-end items-center w-full py-4 px-4 lg:px-8 border-b border-gray-100 h-[80px]">
    <!-- Mobile/Tablet Logo and Hamburger Menu -->
    <div class="flex items-center lg:hidden">
        <!-- Hamburger Menu Button -->
        <button (click)="onToggleSidebar()" class="p-2 rounded-md hover:bg-gray-100 transition-colors mr-3" aria-label="Toggle menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

        <!-- Logo for mobile/tablet -->
        <div class="flex items-center space-x-3 cursor-pointer" [routerLink]="['/home']">
            <img class="h-10 w-10 object-contain rounded-lg" src="assets/images/IBA-logo.png" alt="IBA logo" />
            <div class="flex flex-col">
                <span class="text-sm font-bold text-gray-800">International</span>
                <span class="text-sm font-bold text-gray-800">Bible Academy</span>
            </div>
        </div>
    </div>

    <!-- Right side content -->
    <div class="flex items-center gap-3">
        <!-- Support Button -->
        <button (click)="supportDialog.open()" class="flex items-center justify-center bg-golden-600 text-white rounded-md p-2 hover:bg-golden-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                    fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z"
                    clip-rule="evenodd"
                />
            </svg>
            <span class="hidden lg:inline-block ml-2 text-sm">{{ translationService.instant('support') || 'Support' }}</span>
        </button>

        <!-- Language Selector - Hidden for now as mentioned in original -->
        <div class="relative hidden" clickOutside (clickOutside)="closeDropdown()">
            <button (click)="toggleLanguageDropdown()" class="flex items-center space-x-2 bg-white rounded-md px-3 py-2 border border-gray-300 hover:bg-gray-50 transition-colors">
                <span class="text-sm">{{ this.currentLanguage }}</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            @if (isLanguageDropdownOpen) {
                <div class="absolute right-0 z-10 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5">
                    <div class="py-1" role="menu" aria-orientation="vertical">
                        <a *ngFor="let lang of availableLanguages" (click)="selectLanguage(lang.code)" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer" [class.font-medium]="currentLanguage === lang.code">
                            {{ lang.name }}
                        </a>
                    </div>
                </div>
            }
        </div>

        <!-- Sign Out Button -->
        <button (click)="signOut()" class="flex items-center text-gray-600 hover:text-gray-800 p-3 lg:p-0 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="font-medium hidden lg:inline-block text-sm">
                {{ translationService.instant('signOut') }}
            </span>
        </button>
    </div>
</div>
<!-- Support Dialog Component -->
<app-support-dialog #supportDialog (submit)="handleSupportSubmit($event)" />
