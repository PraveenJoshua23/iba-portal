<!-- Mobile Overlay -->
<div *ngIf="isOpen" class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" (click)="onCloseSidebar()" [@fadeInOut]></div>

<!-- Sidebar -->
<aside
    class="fixed lg:static inset-y-0 left-0 z-50 lg:z-auto flex h-full lg:h-screen flex-col items-center space-y-3 lg:space-y-0 w-72 overflow-hidden bg-gray-200 border-r border-gray-300 px-3 py-4 transform transition-transform duration-300 ease-in-out"
    [class.translate-x-0]="isOpen"
    [class.-translate-x-full]="!isOpen"
    [class.lg:translate-x-0]="true"
>
    <!-- Close button for mobile -->
    <button class="absolute top-4 right-4 p-2 rounded-md hover:bg-gray-300 transition-colors lg:hidden" (click)="onCloseSidebar()" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </button>

    <!-- Logo - Hidden on mobile/tablet, shown on desktop -->
    <div class="hidden lg:flex items-center justify-start w-full px-4 py-6 border-b border-gray-300">
        <div class="flex items-center space-x-4 cursor-pointer" (click)="onMenuItemClick('/home')">
            <img class="h-12 w-12 object-contain rounded-lg" src="assets/images/IBA-logo.png" alt="IBA logo" />
            <div class="flex flex-col">
                <span class="text-lg font-bold text-gray-800">International</span>
                <span class="text-lg font-bold text-gray-800">Bible Academy</span>
            </div>
        </div>
    </div>

    <!-- Menu Items -->
    <div class="flex flex-col justify-start items-center w-full h-full px-5 py-6 lg:py-10">
        <ul class="flex flex-col w-full space-y-3">
            <ng-container *ngFor="let item of menuItems">
                <li class="group w-full" *ngIf="canShowMenuItem(item)">
                    <a (click)="onMenuItemClick(item.route)" [routerLink]="item.route" routerLinkActive="bg-gray-300" class="flex items-center px-4 py-3 space-x-3 rounded-lg transition-all duration-200 hover:bg-gray-300 cursor-pointer">
                        <span class="p-2 rounded-md">
                            <img [src]="item.icon" [alt]="item.label" class="w-5 h-5" />
                        </span>
                        <span class="font-medium text-gray-700">{{ translationService.instant(item.label) }}</span>
                    </a>
                </li>
            </ng-container>
        </ul>
    </div>

    <!-- User Info -->
    <div class="mt-auto border-t border-gray-300 w-full px-4 py-4">
        <div class="flex items-center space-x-3 hover:bg-gray-300 rounded-lg p-3 transition-all duration-200 cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center">
                <img src="../../../assets/icons/profile.svg" alt="profile" class="w-5 h-5" />
            </div>
            <div class="flex flex-col">
                <span class="text-sm font-medium text-gray-700">{{ usrEmail }}</span>
                <span class="text-xs text-gray-500">{{ userRole || 'Student' }}</span>
            </div>
        </div>
    </div>
</aside>
